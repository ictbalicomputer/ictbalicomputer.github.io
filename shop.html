<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ICT BALI COMPUTER</title>

<link rel="icon" href="https://i.ibb.co.com/JwwgBV65/logo-ict.png">

<style>

@media (max-width:700px){

/* navbar vertikal */
.nav{
flex-direction:column;
padding:10px 12px;
gap:8px;
}

/* baris logo */
.nav-brand{
display:flex;
align-items:center;
justify-content:flex-start;
gap:8px;
font-weight:700;
font-size:20px;
color:var(--primary-color);
white-space:nowrap;
width:100%;
position:relative;
}

/* dark mode pojok kanan */
#themeToggle{
position:absolute;
right:0;
}

/* search full */
.search-container{
width:100%;
margin:0;
}

/* menu bawah */
.nav-menu{
width:100%;
display:flex;
justify-content:space-between;
margin-top:5px;
}

/* tombol menu */
.nav button.menu-btn{
flex:1;
flex-direction:column;
gap:2px;
font-size:11px;
padding:6px 2px;
}
}

/* --- SLIDER --- */
.container {
display: flex;
width: 100%;
min-height: 100vh;
padding-top: 75px;
}

.section { 
min-width: 100%; 
padding: 20px; 
box-sizing: border-box; 
}

@media (max-width: 900px) { 
.container { 
margin-top: 90px;
min-height: 100dvh;
}

.section{ 
padding: 10px; 
}
  
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
overflow:hidden;
}

iframe{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

</style>

</head>

<body>

<iframe id="app"
src="https://script.google.com/macros/s/AKfycbxhLajZd-Vdajp8Re12XEI2Y-THKbnflpc6tENusWOoqu64iLnqu_qsiJ7ZGDwW2WDPOA/exec">
</iframe>

<script>

function fixScale(){
let scale = window.innerWidth / document.documentElement.clientWidth;
document.body.style.zoom = scale;
}

window.addEventListener("resize",fixScale);
fixScale();

</script>

</body>
</html>
