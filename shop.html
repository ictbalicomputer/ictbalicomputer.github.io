<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICT BALI COMPUTER</title>
    <link rel="icon" href="https://i.ibb.co.com/JwwgBV65/logo-ict.png">

    <style>
        /* Menghilangkan semua margin dan scroll pada pembungkus */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Kunci agar tidak ada scroll ganda */
            background-color: #ffffff;
        }

        /* Memaksa iframe memenuhi layar secara presisi */
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            /* Memastikan tidak ada gap di bawah iframe */
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxhLajZd-Vdajp8Re12XEI2Y-THKbnflpc6tENusWOoqu64iLnqu_qsiJ7ZGDwW2WDPOA/exec"
            allow="geolocation; microphone; camera"
            loading="lazy">
        </iframe>
    </div>

</body>
</html>
